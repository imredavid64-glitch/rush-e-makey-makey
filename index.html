<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rush E - Local Audio Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #050505; color: white; overflow: hidden; font-family: ui-sans-serif, system-ui, sans-serif; }
        canvas { display: block; }
        .ui-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 50; transition: opacity 0.5s ease; }
        #trigger-box {
            width: 180px; height: 180px; border: 4px solid #ef4444; background: rgba(239, 68, 68, 0.1);
            display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 20px;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #trigger-box:hover { background: rgba(239, 68, 68, 0.3); transform: scale(1.1); box-shadow: 0 0 50px rgba(239, 68, 68, 0.6); }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="ui-overlay" id="overlay">
        <div id="trigger-box">
            <span class="text-red-500 font-black text-6xl italic uppercase tracking-tighter">E</span>
        </div>
        <p class="mt-6 text-zinc-400 uppercase tracking-widest text-xs font-bold animate-pulse">Click to Play (Requires rushe.mp3)</p>
    </div>

    <canvas id="visualizer"></canvas>

    <!-- Local Audio Element -->
    <audio id="rush-audio" src="rushe.mp3" preload="auto"></audio>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const trigger = document.getElementById('trigger-box');
        const audio = document.getElementById('rush-audio');

        let width, height, isRunning = false;
        let notes = [];
        const numKeys = 88;

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        class Note {
            constructor(xIndex, length) {
                this.xIndex = xIndex;
                this.y = -length;
                this.length = length;
                // Mostly red for Rush E, with some blue/purple highlights
                this.color = Math.random() > 0.7 ? '#ef4444' : `hsl(${220 + Math.random() * 40}, 80%, 60%)`;
            }
            update() { this.y += 10; } // Note fall speed
            draw() {
                const x = this.xIndex * (width / numKeys);
                const w = (width / numKeys) - 1;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillRect(x, this.y, w, this.length);
                ctx.shadowBlur = 0;
            }
        }

        function spawnNotes() {
            // Chaotic spawning logic
            if (Math.random() > 0.4) {
                const count = Math.floor(Math.random() * 6) + 1;
                for (let i = 0; i < count; i++) {
                    notes.push(new Note(Math.floor(Math.random() * numKeys), 30 + Math.random() * 150));
                }
            }
            // Rapid streams
            if (Math.random() > 0.98) {
                for (let i = 0; i < numKeys; i += 2) notes.push(new Note(i, 50));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; // Trail effect
            ctx.fillRect(0, 0, width, height);

            if (isRunning) spawnNotes();

            for (let i = notes.length - 1; i >= 0; i--) {
                const n = notes[i];
                n.update();
                n.draw();
                if (n.y > height) notes.splice(i, 1);
            }

            // Piano keys visualization at bottom
            ctx.fillStyle = '#111';
            ctx.fillRect(0, height - 80, width, 80);
            
            // Key highlights
            const kw = width / numKeys;
            notes.forEach(n => {
                if (n.y + n.length >= height - 80) {
                    ctx.fillStyle = n.color;
                    ctx.fillRect(n.xIndex * kw, height - 80, kw - 1, 80);
                }
            });

            requestAnimationFrame(animate);
        }

        trigger.addEventListener('click', () => {
            audio.play().then(() => {
                isRunning = true;
                overlay.classList.add('hidden');
            }).catch(e => {
                console.error("Audio failed. Check if rushe.mp3 exists in the folder.", e);
                // Fallback: Start visual even if audio fails
                isRunning = true;
                overlay.classList.add('hidden');
            });
        });

        animate();
    </script>
</body>
</html>
