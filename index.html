<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rush E - Click to Stay Alive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #050505; color: white; overflow: hidden; font-family: ui-sans-serif, system-ui, sans-serif; user-select: none; }
        canvas { display: block; }
        .ui-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 50; pointer-events: none; }
        #trigger-box {
            width: 180px; height: 180px; border: 4px solid #ef4444; background: rgba(239, 68, 68, 0.1);
            display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 20px;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); transition: all 0.1s ease-out;
            pointer-events: auto;
        }
        #trigger-box.active { transform: scale(0.9); background: rgba(239, 68, 68, 0.5); box-shadow: 0 0 60px #ef4444; }
        .energy-bar-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 300px; height: 10px; background: #111; border-radius: 5px; border: 1px solid #333; }
        #energy-bar { width: 100%; height: 100%; background: #ef4444; border-radius: 5px; transition: width 0.1s linear; }
    </style>
</head>
<body>

    <div class="energy-bar-container" id="energy-ui" style="display: none;">
        <div id="energy-bar"></div>
        <p class="text-[10px] uppercase tracking-widest text-center mt-2 text-red-500 font-bold">Keep Clicking!</p>
    </div>

    <div class="ui-overlay" id="overlay">
        <div id="trigger-box">
            <span class="text-red-500 font-black text-6xl italic uppercase tracking-tighter">E</span>
        </div>
        <p id="instruction" class="mt-6 text-zinc-400 uppercase tracking-widest text-xs font-bold animate-pulse">Click to Start the Chaos</p>
    </div>

    <canvas id="visualizer"></canvas>
    <audio id="rush-audio" src="rushe.mp3" preload="auto" loop></audio>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const trigger = document.getElementById('trigger-box');
        const audio = document.getElementById('rush-audio');
        const energyBar = document.getElementById('energy-bar');
        const energyUi = document.getElementById('energy-ui');
        const instruction = document.getElementById('instruction');

        let width, height;
        let notes = [];
        const numKeys = 88;

        // Game Logic State
        let energy = 0; // 0 to 100
        const decayRate = 1.5; // How fast energy drops per frame
        const gainPerClick = 25; // How much energy you get per click
        let isPlaying = false;

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        class Note {
            constructor(xIndex, length) {
                this.xIndex = xIndex;
                this.y = -length;
                this.length = length;
                this.color = Math.random() > 0.6 ? '#ef4444' : '#fff';
            }
            update() { this.y += 12; }
            draw() {
                const x = this.xIndex * (width / numKeys);
                const w = (width / numKeys) - 1;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillRect(x, this.y, w, this.length);
                ctx.shadowBlur = 0;
            }
        }

        function spawnNotes() {
            if (energy > 10) {
                const spawnCount = Math.floor(energy / 20) + 1;
                for (let i = 0; i < spawnCount; i++) {
                    notes.push(new Note(Math.floor(Math.random() * numKeys), 40 + Math.random() * 100));
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);

            if (isPlaying) {
                energy = Math.max(0, energy - decayRate);
                energyBar.style.width = energy + '%';
                
                if (energy > 5) {
                    spawnNotes();
                    if (audio.paused) audio.play();
                } else {
                    if (!audio.paused) audio.pause();
                }
            }

            for (let i = notes.length - 1; i >= 0; i--) {
                const n = notes[i];
                n.update();
                n.draw();
                if (n.y > height) notes.splice(i, 1);
            }

            // Piano UI
            ctx.fillStyle = '#111';
            ctx.fillRect(0, height - 60, width, 60);
            const kw = width / numKeys;
            notes.forEach(n => {
                if (n.y + n.length >= height - 60) {
                    ctx.fillStyle = n.color;
                    ctx.fillRect(n.xIndex * kw, height - 60, kw - 1, 60);
                }
            });

            requestAnimationFrame(animate);
        }

        trigger.addEventListener('mousedown', () => {
            trigger.classList.add('active');
            energy = Math.min(100, energy + gainPerClick);
            
            if (!isPlaying) {
                isPlaying = true;
                energyUi.style.display = 'block';
                instruction.innerText = "KEEP CLICKING!";
            }
        });

        window.addEventListener('mouseup', () => {
            trigger.classList.remove('active');
        });

        // Touch support for mobile
        trigger.addEventListener('touchstart', (e) => {
            e.preventDefault();
            trigger.classList.add('active');
            energy = Math.min(100, energy + gainPerClick);
            if (!isPlaying) {
                isPlaying = true;
                energyUi.style.display = 'block';
            }
        });

        trigger.addEventListener('touchend', () => {
            trigger.classList.remove('active');
        });

        animate();
    </script>
</body>
</html>
